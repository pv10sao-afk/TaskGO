name: Android Build 🚀

# Запускати збірку кожного разу, коли ти пушиш код у гілку main або master
on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    # Використовуємо безкоштовний сервер на Linux (він працює швидше за Windows)
    runs-on: ubuntu-latest

    steps:
    # 1. Завантажуємо твій код на сервер
    - name: Отримання коду
      uses: actions/checkout@v4

    # 2. Встановлюємо правильну Java 17
    - name: Налаштування Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. Даємо права на запуск системи збірки Gradle (для Linux це обов'язково)
    - name: Права для Gradle
      run: chmod +x gradlew

    # 4. ТА САМА КОМАНДА: Збираємо APK!
    - name: Збірка APK
      run: ./gradlew assembleDebug

    # 5. Забираємо готовий файл і прикріплюємо його до сторінки на GitHub
    - name: Збереження APK
      uses: actions/upload-artifact@v4
      with:
        name: My-Game-APK
        path: app/build/outputs/apk/debug/app-debug.apk
