name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.2.2"
  GODOT_RELEASE: "stable"
  EXPORT_PRESET: "Android"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ── 1. Java (required for Android SDK / Gradle) ──────────────────────────
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # ── 2. Install Godot headless ─────────────────────────────────────────────
    - name: Download Godot ${{ env.GODOT_VERSION }}
      run: |
        GODOT_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
        wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_FILENAME}.zip"
        unzip -q "${GODOT_FILENAME}.zip"
        sudo mv "${GODOT_FILENAME}" /usr/local/bin/godot
        sudo chmod +x /usr/local/bin/godot

    # ── 3. Install Godot export templates ────────────────────────────────────
    - name: Download export templates
      run: |
        TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
        wget -q "$TEMPLATES_URL" -O export_templates.tpz
        mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
        unzip -q export_templates.tpz -d /tmp/templates
        mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

    # ── 4. Setup Android SDK ──────────────────────────────────────────────────
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate debug keystore
      run: |
        keytool -genkey -v \
          -keystore debug.keystore \
          -alias androiddebugkey \
          -keyalg RSA -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Android Debug,O=Android,C=US"

    - name: Configure Godot Android SDK path and debug keystore
      run: |
        mkdir -p ~/.config/godot
        cat > ~/.config/godot/editor_settings-4.tres << EOF
        [gd_resource type="EditorSettings" format=3]
        [resource]
        export/android/android_sdk_path = "$ANDROID_HOME"
        export/android/debug_keystore = "$GITHUB_WORKSPACE/debug.keystore"
        export/android/debug_keystore_user = "androiddebugkey"
        export/android/debug_keystore_pass = "android"
        EOF

    # ── 5. Import project assets ──────────────────────────────────────────────
    # FIX: was missing --quit → Godot hung forever → exit code 124 (timeout)
    - name: Import project
      run: |
        mkdir -p .godot
        godot --headless --path . --import --quit 2>&1 || true
      timeout-minutes: 5

    # ── 6. Export APK ─────────────────────────────────────────────────────────
    # FIX 1: path was "build/android/" but export_presets.cfg uses "builds/android/"
    # FIX 2: --export-release requires a signed keystore — use --export-debug for CI
    - name: Export debug APK
      run: |
        mkdir -p builds/android
        godot --headless --path . --export-debug "${{ env.EXPORT_PRESET }}" builds/android/android.apk
      timeout-minutes: 10

    # ── 7. Upload artifact ────────────────────────────────────────────────────
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: builds/android/android.apk
        retention-days: 30
