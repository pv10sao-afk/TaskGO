name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Godot
      uses: dulvui/godot-android-export@v4
      with:
        godot-version: "4.2.2"
        
    - name: Import project
      run: |
        mkdir -p .godot
        godot --headless --path . --import --quit
        
    - name: Build Android APK
      run: |
        mkdir -p build/android
        godot --headless --path . --export-release "Android" build/android/android.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/android/android.apk
        retention-days: 30